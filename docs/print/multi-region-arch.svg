<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" width="640" height="380" role="img" aria-labelledby="title desc">
  <title id="title">Multi-region operator topology</title>
  <desc id="desc">Two regions with core sites, transit and IXP, private backbone, and edge PoPs toward customers.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .region { fill: #fafafa; stroke: #666; stroke-width: 1.5; }
      .core { fill: #e8f0f8; stroke: #1a4d80; stroke-width: 1.5; }
      .edge { fill: #f0f8f0; stroke: #2d662d; stroke-width: 1.5; }
      .cust { fill: #fff; stroke: #333; stroke-width: 1.2; }
      text { font-family: DejaVu Sans, Helvetica Neue, Arial, sans-serif; font-size: 11px; fill: #111; }
      .h { font-weight: bold; font-size: 12px; }
      .bb { stroke: #80501a; stroke-width: 2.5; fill: none; }
      .dashed { stroke: #555; stroke-width: 1.2; stroke-dasharray: 6 4; fill: none; }
    ]]></style>
  </defs>
  <text x="320" y="22" text-anchor="middle" font-weight="bold" font-size="15px">Reference: multi-region presence</text>
  <!-- Region West -->
  <rect class="region" x="24" y="44" width="280" height="200" rx="8"/>
  <text x="164" y="64" text-anchor="middle" class="h">Region West</text>
  <rect class="core" x="44" y="78" width="100" height="52" rx="4"/>
  <text x="94" y="98" text-anchor="middle">Core DC</text>
  <text x="94" y="114" text-anchor="middle">transit + IXP</text>
  <rect class="core" x="164" y="78" width="100" height="52" rx="4"/>
  <text x="214" y="98" text-anchor="middle">Core DC</text>
  <text x="214" y="114" text-anchor="middle">transit + IXP</text>
  <rect class="edge" x="44" y="160" width="88" height="40" rx="4"/>
  <text x="88" y="178" text-anchor="middle">Edge PoP</text>
  <text x="88" y="192" text-anchor="middle" font-size="9px">anycast / DNS</text>
  <rect class="edge" x="176" y="160" width="88" height="40" rx="4"/>
  <text x="220" y="178" text-anchor="middle">Edge PoP</text>
  <line class="dashed" x1="94" y1="130" x2="88" y2="160"/>
  <line class="dashed" x1="214" y1="130" x2="220" y2="160"/>
  <!-- Region East -->
  <rect class="region" x="336" y="44" width="280" height="200" rx="8"/>
  <text x="476" y="64" text-anchor="middle" class="h">Region East</text>
  <rect class="core" x="356" y="78" width="100" height="52" rx="4"/>
  <text x="406" y="98" text-anchor="middle">Core DC</text>
  <text x="406" y="114" text-anchor="middle">transit + IXP</text>
  <rect class="core" x="476" y="78" width="100" height="52" rx="4"/>
  <text x="526" y="98" text-anchor="middle">Core DC</text>
  <text x="526" y="114" text-anchor="middle">transit + IXP</text>
  <rect class="edge" x="356" y="160" width="88" height="40" rx="4"/>
  <text x="400" y="178" text-anchor="middle">Edge PoP</text>
  <rect class="edge" x="484" y="160" width="88" height="40" rx="4"/>
  <text x="528" y="178" text-anchor="middle">Edge PoP</text>
  <line class="dashed" x1="406" y1="130" x2="400" y2="160"/>
  <line class="dashed" x1="526" y1="130" x2="528" y2="160"/>
  <!-- backbone between regions -->
  <path class="bb" d="M 164 104 Q 320 20 476 104"/>
  <text x="320" y="36" text-anchor="middle" font-size="10px" fill="#80501a">Private backbone / leased wave (preferred)</text>
  <!-- customers -->
  <rect class="cust" x="100" y="268" width="440" height="88" rx="8"/>
  <text x="320" y="290" text-anchor="middle" class="h">Customers (Internet path)</text>
  <text x="320" y="310" text-anchor="middle">Reach you via BGP/DNS/TLS to edge; last mile and local IXPs assumed working for this path</text>
  <text x="320" y="330" text-anchor="middle" font-size="10px" fill="#444">Public Internet remains backup path between regions if private link fails</text>
  <line class="dashed" x1="88" y1="200" x2="140" y2="268"/>
  <line class="dashed" x1="220" y1="200" x2="200" y2="268"/>
  <line class="dashed" x1="400" y1="200" x2="440" y2="268"/>
  <line class="dashed" x1="528" y1="200" x2="500" y2="268"/>
</svg>
