<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-labelledby="title desc">
  <title id="title">Networks at an IXP</title>
  <desc id="desc">Three participant networks connect router ports to a shared exchange fabric; optional route server.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .as { fill: #fff; stroke: #333; stroke-width: 1.5; }
      .rtr { fill: #eef6ee; stroke: #2d662d; stroke-width: 1.5; }
      .ixp { fill: #e8f0f8; stroke: #1a4d80; stroke-width: 2; }
      .rs { fill: #f8f0e8; stroke: #80501a; stroke-width: 1.5; stroke-dasharray: 4 2; }
      text { font-family: DejaVu Sans, Helvetica Neue, Arial, sans-serif; font-size: 12px; fill: #111; }
      .lbl { font-size: 11px; fill: #333; }
      .line { stroke: #444; stroke-width: 2; fill: none; }
      .thin { stroke: #888; stroke-width: 1.2; stroke-dasharray: 5 3; fill: none; }
    ]]></style>
  </defs>
  <text x="320" y="26" text-anchor="middle" font-weight="bold" font-size="15px">Internet exchange — many networks, one fabric</text>
  <!-- AS A -->
  <rect class="as" x="40" y="60" width="140" height="100" rx="6"/>
  <text x="110" y="82" text-anchor="middle" font-weight="bold">AS A</text>
  <rect class="rtr" x="60" y="95" width="100" height="36" rx="4"/>
  <text x="110" y="117" text-anchor="middle">Router</text>
  <!-- AS B -->
  <rect class="as" x="250" y="60" width="140" height="100" rx="6"/>
  <text x="320" y="82" text-anchor="middle" font-weight="bold">AS B</text>
  <rect class="rtr" x="270" y="95" width="100" height="36" rx="4"/>
  <text x="320" y="117" text-anchor="middle">Router</text>
  <!-- AS C -->
  <rect class="as" x="460" y="60" width="140" height="100" rx="6"/>
  <text x="530" y="82" text-anchor="middle" font-weight="bold">AS C</text>
  <rect class="rtr" x="480" y="95" width="100" height="36" rx="4"/>
  <text x="530" y="117" text-anchor="middle">Router</text>
  <!-- IXP fabric -->
  <rect class="ixp" x="120" y="200" width="400" height="100" rx="8"/>
  <text x="320" y="228" text-anchor="middle" font-weight="bold">IXP fabric (L2 / VLANs or operator-defined L3)</text>
  <text x="320" y="248" text-anchor="middle" class="lbl">Cross-connects; bilateral or multilateral peering sessions (eBGP)</text>
  <!-- Route server -->
  <rect class="rs" x="255" y="265" width="130" height="28" rx="4"/>
  <text x="320" y="283" text-anchor="middle" class="lbl">Route server (optional)</text>
  <!-- lines router to fabric -->
  <line class="line" x1="110" y1="131" x2="180" y2="200"/>
  <line class="line" x1="320" y1="131" x2="320" y2="200"/>
  <line class="line" x1="530" y1="131" x2="460" y2="200"/>
  <!-- Transit hint -->
  <text x="320" y="330" text-anchor="middle" class="lbl">Off-IXP: each AS may still use paid transit to reach the rest of the Internet</text>
</svg>
